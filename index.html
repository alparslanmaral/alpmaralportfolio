<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Photography & Video</title>

  <!-- Cinematic / typewriter type -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Three.js (module + addons). Requires a local server. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 3D scene is drawn here -->
  <canvas id="scene"></canvas>

  <!-- Darkening / vignette / film grain layers -->
  <div id="vignette"></div>
  <div id="grain"></div>

  <!-- Intro loading screen -->
  <div id="loader">
    <div class="loader-inner">
      <span class="loader-title">ARCHIVE</span>
      <span class="loader-sub">retrieving files…</span>
      <div class="loader-bar"><i></i></div>
    </div>
  </div>

  <!-- Album name on hover -->
  <div id="album-label" class="hidden"></div>

  <!-- Bottom-center hint text -->
  <div id="hint" class="hidden"></div>

  <!-- Inspect screen "click" call-to-action -->
  <div id="inspect-cta" class="hidden">
    <span class="cta-name"></span>
    <span class="cta-action">Click to open</span>
  </div>

  <!-- In-album controls -->
  <div id="book-ui" class="hidden">
    <button id="prev" aria-label="Previous page">‹</button>
    <div id="page-counter">1 / 1</div>
    <button id="next" aria-label="Next page">›</button>
  </div>

  <!-- Top corner: go back -->
  <button id="back" class="hidden">‹ BACK TO DESK</button>

  <!-- Enlarged framed photo (Resident Evil style) -->
  <div id="photo-viewer" class="hidden">
    <div class="pv-frame"><img id="pv-img" alt="" /></div>
    <span class="pv-close">click anywhere to close · Esc</span>
  </div>

  <!-- Brand (desk view) -->
  <header id="brand">
    <h1>ARCHIVE</h1>
    <p>photography &amp; video — browse the files</p>
  </header>

  <script type="module" src="js/main.js"></script>
</body>
</html>
